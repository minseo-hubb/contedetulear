<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brunch Landing Page</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="circle"></div>

        <header>
            <a href="#" class="logo">
                <img src="./tul.jpg" alt="Brunch Logo">
            </a>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="https://www.catchtable.net/shop/contedetulear/menus">Menu</a></li>
                <li><a href="#">Location</a></li>
                <li><a href="https://contedetulear.com/">Perfume</a></li>
            </ul>
        </header>

        <div class="content">
            <div class="textBox">
                <h2>BREAKFAST AND LUNCH<br> <span>Conte de Tulear</span></h2>
                <p>서울시 강남구 도산대로 49길 39</p>
                <a href="https://www.catchtable.net/shop/contedetulear">예약하기</a>
            </div>

            <div class="imgBox">
                <img src="./김치볶음밥.png" class="main-img" alt="Main Brunch Image">
            </div>
        </div>

        <ul class="thumb">
            <li><img src="./김치볶음밥.png" onclick="slider('./김치볶음밥.png')"></li>
            <li><img src="./로제파스타.png" onclick="slider('./로제파스타.png')"></li>
            <li><img src="./피쉬앤칩스.png" onclick="slider('./피쉬앤칩스.png')"></li>
            <li><img src="./솔티드 캬라멜 빙수.png" onclick="slider('./솔티드 캬라멜 빙수.png')"></li>
        </ul>
    </section>

    <script>
        function slider(path) {
            document.querySelector('.main-img').src = path;
        }
    </script>
</body>
</html>
